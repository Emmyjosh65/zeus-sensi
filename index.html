<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS SENSI AI v6.0</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-gradient"></div>
<div id="toast"></div>

<section id="landing" class="page active">
  <div class="container center">
    <h1 class="logo">ZEUS <span>SENSI AI</span></h1>
    <p class="subtitle">AI Powered Free Fire Sensitivity Generator</p>
    <button class="cta-btn" onclick="showPage('gate')">Generate My Sensitivity</button>
  </div>
</section>

<section id="gate" class="page">
  <div class="container center">
    <div class="glass-card">
      <h2>Join Official Community</h2>
      <a href="https://whatsapp.com/channel/0029VbCsw0SGE56rCTPaXd06" target="_blank" class="cta-btn">JOIN ZEUS FAMILY CHANNEL</a>
      <button class="cta-btn secondary" onclick="showPage('access')">Already Joined? Continue →</button>
    </div>
  </div>
</section>

<section id="access" class="page">
  <div class="container center">
    <div class="glass-card">
      <h2>Enter Access Code</h2>
      <div class="pin-inputs" id="pinBox">
        <input type="tel" maxlength="1">
        <input type="tel" maxlength="1">
        <input type="tel" maxlength="1">
        <input type="tel" maxlength="1">
      </div>
      <p id="pin-error"></p>
      <button class="cta-btn" onclick="checkPin()">Unlock Generator</button>
    </div>
  </div>
</section>

<section id="generator" class="page">
  <div class="container">
    <h2>AI Sensitivity Generator</h2>
    <input type="text" id="deviceSearch" placeholder="Search your phone... e.g. iphone 13, s24, tecno">
    <div id="suggestions" class="glass-card suggestions"></div>
    <div id="deviceSpecs" class="glass-card" style="display:none"></div>
    <button class="cta-btn" id="generateBtn" disabled>Generate With AI</button>
  </div>
</section>

<section id="ai" class="page">
  <div class="container center">
    <h2 id="ai-text">AI Detecting Device...</h2>
    <div class="progress-bar"><div id="progress"></div></div>
  </div>
</section>

<section id="results" class="page">
  <div class="container">
    <div class="glass-card">
      <h2>Your AI Sensitivity Profile</h2>
      <div id="resultSpecs"></div>
      <div id="resultSensi" class="sensi-grid"></div>
      <button class="cta-btn" onclick="copySensi()">Copy Sensitivity</button>
    </div>
    <button class="cta-btn secondary" onclick="showPage('generator')">← Generate Again</button>
  </div>
</section>

<a href="https://wa.me/2349066760078" target="_blank" class="support-btn">Need an Access Code? Contact Owner</a>

<script src="script.js"></script>
</body>
</html>
